<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para ti ❤️</title>

<style>
body{
margin:0;
overflow:hidden;
background:black;
font-family:Georgia,serif;
color:white;
}

/* INTRO */
#inicio{
position:fixed;
width:100%;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:black;
cursor:pointer;
z-index:10;
}

#inicio h1{
opacity:.9;
text-align:center;
}

/* CONTENIDO */
#contenido{
display:none;
height:100vh;
position:relative;
}

/* ESTRELLAS */
canvas{
position:absolute;
top:0;
left:0;
z-index:0;
}

/* TEXTO MEJORADO */
#texto{
position:absolute;
top:35%;
left:50%;
transform:translateX(-50%);
width:80%;
text-align:center;
font-size:22px;
opacity:0;
transition:2s;
padding:15px;
z-index:2;

/* efecto elegante */
background:rgba(0,0,0,0.4);
backdrop-filter:blur(6px);
border-radius:20px;
}

/* FOTO */
#foto{
position:absolute;
top:65%;
left:50%;
transform:translate(-50%,-50%) scale(.8);
width:240px;
border-radius:20px;
box-shadow:0 0 80px rgba(255,255,255,.6);
opacity:0;
transition:3s;
z-index:1;
}

/* FINAL */
#final{
position:absolute;
top:50%;
width:100%;
text-align:center;
font-size:30px;
opacity:0;
text-shadow:0 0 40px white;
transition:3s;
z-index:3;
padding:20px;
}

iframe{
position:absolute;
width:0;
height:0;
border:0;
}
</style>
</head>

<body>

<div id="inicio" onclick="iniciar()">
<h1>Toca aquí…<br>esto es solo para ti ❤️</h1>
</div>

<div id="contenido">

<canvas id="estrellas"></canvas>

<div id="texto"></div>

<img src="pio.jpg" id="foto">

<div id="final"></div>

<iframe id="musica" allow="autoplay"></iframe>

</div>

<script>

/* FRASES */
const frases=[
"Hoy es 19 de marzo…",
"",
"Y no quería decirte algo común.",
"",
"Porque tú no eres común.",
"",
"Mi hombrecito bonito…",
"",
"No solo por lo que haces…",
"sino por cómo eres.",
"",
"Por tu forma de pensar.",
"Por tu manera de ser.",
"",
"Y por esa calma que transmites…",
"",
"que no todos tienen.",
"",
"Chulo…",
"",
"me gusta que seas tú.",
"",
"Así, tal como eres.",
"",
"Hoy solo quiero que recuerdes algo:"
];

let i=0;

function iniciar(){

document.getElementById("inicio").style.display="none";
document.getElementById("contenido").style.display="block";

/* MUSICA */
document.getElementById("musica").src=
"https://www.youtube.com/embed/aJGWTdueHFY?autoplay=1&loop=1&playlist=aJGWTdueHFY";

/* FOTO */
setTimeout(()=>{
let f=document.getElementById("foto");
f.style.opacity="1";
f.style.transform="translate(-50%,-50%) scale(1)";
},4000);

mostrar();
}

/* TEXTO */
function mostrar(){
let t=document.getElementById("texto");

if(i<frases.length){

t.style.opacity=0;

setTimeout(()=>{
t.innerHTML=frases[i];
t.style.opacity=1;
i++;
setTimeout(mostrar,3000);
},1000);

}else{

/* FINAL */
setTimeout(()=>{
document.getElementById("texto").style.opacity="0";
document.getElementById("foto").style.opacity="0";

setTimeout(()=>{
document.getElementById("final").innerHTML=
"Mi hombrecito bonito… ❤️<br><br>Eres alguien muy especial para mí.<br><br>Feliz Día del Hombre";
document.getElementById("final").style.opacity="1";
},1500);

},2000);

}
}

/* ESTRELLAS */
let canvas=document.getElementById("estrellas");
let ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let estrellas=[];
for(let i=0;i<300;i++){
estrellas.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*1.5,
a:Math.random()
});
}

function animar(){
ctx.clearRect(0,0,canvas.width,canvas.height);

estrellas.forEach(e=>{
ctx.beginPath();
ctx.fillStyle="rgba(255,255,255,"+e.a+")";
ctx.arc(e.x,e.y,e.r,0,Math.PI*2);
ctx.fill();

e.a+=(Math.random()-0.5)*0.05;
if(e.a<0)e.a=0;
if(e.a>1)e.a=1;
});

requestAnimationFrame(animar);
}

animar();

</script>

</body>
</html>
